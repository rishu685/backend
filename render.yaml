services:
  - type: web
    name: zoorvyn-finance-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: mkdir -p data && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./data/finance.db
