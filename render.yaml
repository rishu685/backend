services:
  - type: web
    name: zoorvyn-finance-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/finance.db
    disk:
      name: finance-data
      mountPath: /var/data
      sizeGB: 1
